<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - Learn Norwegian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .aurora-bg { background: linear-gradient(135deg, #0f172a, #1e3a5f, #312e81, #0f766e); }
    </style>
</head>
<body class="aurora-bg text-white min-h-screen">
    <div id="header"></div>
    
    <div class="max-w-4xl mx-auto px-6 py-12">
        <h1 class="text-4xl font-bold mb-8">About Learn Norwegian</h1>
        <div class="prose prose-invert max-w-none">
            <p class="text-lg leading-relaxed">This is a voice-first language learning app focused on Norwegian Bokmål.</p>
            <p class="text-slate-300">Speak or type in English (British accent supported) and instantly get accurate Bokmål translation + native pronunciation.</p>
            <p class="text-slate-300">Built for real learners who want to practise speaking every day.</p>
        </div>
    </div>
    
    <div id="footer"></div>

    <script>
        function initializeHeader() {
            const hamburgerBtn = document.getElementById('hamburger-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            const bar1 = document.getElementById('bar1');
            const bar2 = document.getElementById('bar2');
            const bar3 = document.getElementById('bar3');

            if (!hamburgerBtn || !mobileMenu || !bar1 || !bar2 || !bar3) return;

            const setMenuState = (isOpen) => {
                mobileMenu.classList.toggle('hidden', !isOpen);
                hamburgerBtn.setAttribute('aria-expanded', String(isOpen));
                bar1.style.transform = isOpen ? 'rotate(45deg) translate(5px, 5px)' : 'none';
                bar2.style.opacity = isOpen ? '0' : '1';
                bar3.style.transform = isOpen ? 'rotate(-45deg) translate(6px, -6px)' : 'none';
            };

            setMenuState(false);
            hamburgerBtn.onclick = () => {
                const isOpen = hamburgerBtn.getAttribute('aria-expanded') === 'true';
                setMenuState(!isOpen);
            };

            mobileMenu.querySelectorAll('a').forEach((link) => {
                link.onclick = () => setMenuState(false);
            });
        }

        async function loadHeaderAndFooter() {
            const [headerRes, footerRes] = await Promise.all([fetch('header.html'), fetch('footer.html')]);
            document.getElementById('header').innerHTML = await headerRes.text();
            document.getElementById('footer').innerHTML = await footerRes.text();
            initializeHeader();
        }
        window.onload = loadHeaderAndFooter;
    </script>
</body>
</html>
</html>
