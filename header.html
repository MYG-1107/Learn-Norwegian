<div class="border-b border-white/10 bg-black/30 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 py-4">
        <div class="flex items-center justify-between">
            
            <!-- Logo + Title (Clickable) -->
            <a href="index.html" class="flex items-center gap-x-3 group">
                <!-- Your SVG Logo -->
                <svg width="280" height="60" viewBox="0 0 280 60" xmlns="http://www.w3.org/2000/svg" class="transition-transform group-hover:scale-105">
                  <g transform="translate(5, 5)">
                    <clipPath id="bubbleClip">
                      <path d="M25 0 C11.19 0 0 11.19 0 25 C0 31.95 2.84 38.25 7.42 42.75 L4 50 L12.5 47.16 C16.14 48.97 20.41 50 25 50 C38.81 50 50 38.81 50 25 C50 11.19 38.81 0 25 0 Z" />
                    </clipPath>
                    <path d="M25 0 C11.19 0 0 11.19 0 25 C0 31.95 2.84 38.25 7.42 42.75 L4 50 L12.5 47.16 C16.14 48.97 20.41 50 25 50 C38.81 50 50 38.81 50 25 C50 11.19 38.81 0 25 0 Z" fill="#BA0C2F" />
                    <rect x="14" y="0" width="8" height="50" fill="#FFFFFF" clip-path="url(#bubbleClip)"/>
                    <rect x="0" y="21" width="50" height="8" fill="#FFFFFF" clip-path="url(#bubbleClip)"/>
                    <rect x="16" y="0" width="4" height="50" fill="#00205B" clip-path="url(#bubbleClip)"/>
                    <rect x="0" y="23" width="50" height="4" fill="#00205B" clip-path="url(#bubbleClip)"/>
                    <rect x="12" y="17" width="3" height="16" rx="1.5" fill="#FFFFFF" />
                    <rect x="23" y="10" width="4" height="30" rx="2" fill="#FFFFFF" />
                    <rect x="35" y="17" width="3" height="16" rx="1.5" fill="#FFFFFF" />
                  </g>
                </svg>
                <h1 class="heading-font text-3xl sm:text-4xl tracking-tighter group-hover:text-emerald-300 transition-colors">
                    Learn Norwegian
                </h1>
            </a>

            <!-- Desktop Navigation -->
            <nav class="hidden md:flex items-center gap-x-8 text-sm font-medium">
                
                <a href="about.html" class="hover:text-emerald-300 transition">About</a>
                <a href="contact-developers.html" class="hover:text-emerald-300 transition">Contact Developers</a>
            </nav>

            <!-- Hamburger Button (Mobile Only) -->
            <button id="hamburger-btn"
                    class="md:hidden flex flex-col justify-center items-center w-10 h-10 space-y-1.5 focus:outline-none">
                <span id="bar1" class="block w-6 h-0.5 bg-white transition-all"></span>
                <span id="bar2" class="block w-6 h-0.5 bg-white transition-all"></span>
                <span id="bar3" class="block w-6 h-0.5 bg-white transition-all"></span>
            </button>
        </div>

        <!-- Mobile Menu (Dropdown) -->
        <div id="mobile-menu" class="hidden md:hidden mt-4 py-4 border-t border-white/10">
            <div class="flex flex-col gap-y-4 text-sm font-medium">
                <a href="about.html" class="hover:text-emerald-300 transition py-2">About</a>
                <a href="contact-developers.html" class="hover:text-emerald-300 transition py-2">Contact Developers</a>
            </div>
        </div>
    </div>
</div>

<script>
    // Hamburger Menu Toggle
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const bar1 = document.getElementById('bar1');
    const bar2 = document.getElementById('bar2');
    const bar3 = document.getElementById('bar3');

    let isOpen = false;

    hamburgerBtn.addEventListener('click', () => {
        isOpen = !isOpen;
        
        if (isOpen) {
            mobileMenu.classList.remove('hidden');
            // Animate to X
            bar1.style.transform = 'rotate(45deg) translate(5px, 5px)';
            bar2.style.opacity = '0';
            bar3.style.transform = 'rotate(-45deg) translate(6px, -6px)';
        } else {
            mobileMenu.classList.add('hidden');
            // Reset to hamburger
            bar1.style.transform = 'none';
            bar2.style.opacity = '1';
            bar3.style.transform = 'none';
        }
    });

    // Close mobile menu when clicking a link
    document.querySelectorAll('#mobile-menu a').forEach(link => {
        link.addEventListener('click', () => {
            isOpen = false;
            mobileMenu.classList.add('hidden');
            bar1.style.transform = 'none';
            bar2.style.opacity = '1';
            bar3.style.transform = 'none';
        });
    });
</script>
